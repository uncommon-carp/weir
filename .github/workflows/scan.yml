name: scan

on:
  workflow_call:
    inputs:
      target-image-tag:
        required: true
        type: string
      target-env:
        description: JSON object of env var overrides for the target container, e.g. '{"AUTH_REQUIRED":"true"}'.
        required: false
        type: string
        default: '{}'

permissions:
  id-token: write
  contents: read

jobs:
  scan:
    name: weir scan
    runs-on: ubuntu-latest
    steps:
      # Checks out the CALLING repo (the target being scanned) — for a
      # workflow_call, checkout defaults to whatever repo triggered this run,
      # not this reusable workflow's own repo. Needed here to build the
      # target's own Dockerfile in "push target image" below.
      - name: checkout target repo
        uses: actions/checkout@v4

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.WEIR_GHA_ROLE_ARN }}
          aws-region: ${{ vars.WEIR_AWS_REGION }}

      - name: load infra outputs from SSM
        run: |
          echo "WEIR_ECS_CLUSTER=$(aws ssm get-parameter --name /weir/ci/ecs-cluster --query Parameter.Value --output text)"                     >> $GITHUB_ENV
          echo "WEIR_TASK_FAMILY=$(aws ssm get-parameter --name /weir/ci/task-family --query Parameter.Value --output text)"                     >> $GITHUB_ENV
          echo "WEIR_SUBNET_IDS=$(aws ssm get-parameter --name /weir/ci/subnet-ids --query Parameter.Value --output text)"                       >> $GITHUB_ENV
          echo "WEIR_SECURITY_GROUP_ID=$(aws ssm get-parameter --name /weir/ci/security-group-id --query Parameter.Value --output text)"         >> $GITHUB_ENV
          echo "WEIR_RESULTS_BUCKET=$(aws ssm get-parameter --name /weir/ci/results-bucket --query Parameter.Value --output text)"                >> $GITHUB_ENV
          echo "WEIR_EXECUTION_ROLE_ARN=$(aws ssm get-parameter --name /weir/ci/execution-role-arn --query Parameter.Value --output text)"       >> $GITHUB_ENV
          echo "WEIR_TASK_ROLE_ARN=$(aws ssm get-parameter --name /weir/ci/task-role-arn --query Parameter.Value --output text)"                 >> $GITHUB_ENV
          echo "WEIR_SCHEDULER_ROLE_ARN=$(aws ssm get-parameter --name /weir/ci/scheduler-role-arn --query Parameter.Value --output text)"       >> $GITHUB_ENV
          echo "WEIR_ECR_TARGET_REPO=$(aws ssm get-parameter --name /weir/ci/ecr-target-repo --query Parameter.Value --output text)"             >> $GITHUB_ENV
          echo "WEIR_ECR_SENTINEL_REPO=$(aws ssm get-parameter --name /weir/ci/ecr-sentinel-repo --query Parameter.Value --output text)"         >> $GITHUB_ENV
          echo "WEIR_LOG_GROUP=$(aws ssm get-parameter --name /weir/ci/log-group --query Parameter.Value --output text)"                         >> $GITHUB_ENV
          echo "WEIR_MAX_CONCURRENT_SCANS=$(aws ssm get-parameter --name /weir/ci/max-concurrent-scans --query Parameter.Value --output text)"   >> $GITHUB_ENV
          echo "WEIR_TEARDOWN_MINUTES=$(aws ssm get-parameter --name /weir/ci/teardown-minutes --query Parameter.Value --output text)"           >> $GITHUB_ENV
          echo "AWS_REGION=${{ vars.WEIR_AWS_REGION }}"                                  >> $GITHUB_ENV
          echo "WEIR_TARGET_IMAGE_TAG=${{ inputs.target-image-tag }}"                    >> $GITHUB_ENV
          echo "WEIR_RUN_ID=weir-${{ github.run_id }}-${{ github.run_attempt }}"         >> $GITHUB_ENV

      - name: push target image
        run: |
          aws ecr get-login-password --region $AWS_REGION \
            | docker login --username AWS --password-stdin \
              $(echo $WEIR_ECR_TARGET_REPO | cut -d/ -f1)
          docker build --platform linux/amd64 \
            -t $WEIR_ECR_TARGET_REPO:$WEIR_TARGET_IMAGE_TAG .
          docker push $WEIR_ECR_TARGET_REPO:$WEIR_TARGET_IMAGE_TAG

      # Weir's own source, checked out explicitly into a subdirectory — the
      # CLI (packages/cli) doesn't exist in the target repo's checkout above.
      # Deliberately checked out *after* the docker build above, so it's
      # never part of the target's build context (avoids bloating/leaking
      # into images for target repos whose Dockerfile does a bare `COPY . .`).
      - name: checkout weir
        uses: actions/checkout@v4
        with:
          repository: uncommon-carp/weir
          path: .weir

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: .weir/package-lock.json

      - name: install weir deps
        working-directory: .weir
        run: npm ci

      - name: build cli
        working-directory: .weir
        run: npm run build --workspace=packages/cli

      - name: run weir
        working-directory: .weir
        env:
          WEIR_TARGET_ENV: ${{ inputs.target-env }}
        run: node packages/cli/dist/cli.js
