# Local pipeline mirror of the Fargate task topology.
# Expected repo layout (siblings under the same parent directory):
#   <parent>/
#   ├── anemone/    — target API
#   ├── sentinel/   — scanner
#   └── weir/       — this file lives here
#
# Usage:
#   docker compose up --build --abort-on-container-exit --exit-code-from sentinel
#
# After a run, pull the report from LocalStack:
#   aws --endpoint-url=http://localhost:4566 \
#       s3 cp s3://sentinel-results/results/local-run.json ./local-run.json

version: '3.8'

services:

  localstack:
    image: localstack/localstack:latest
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN}
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack-init:
    image: amazon/aws-cli:latest
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN}
    entrypoint: >
      /bin/sh -c "
        aws --endpoint-url=http://localstack:4566 s3 mb s3://sentinel-results 2>/dev/null || true
      "
    depends_on:
      localstack:
        condition: service_healthy

  target:
    build:
      context: ../anemone
      dockerfile: Dockerfile
    environment:
      - PORT=3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/v2/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  sentinel:
    build:
      context: ../sentinel
      dockerfile: Dockerfile
    environment:
      - TARGET_URL=http://target:3000
      - RESULTS_BUCKET=sentinel-results
      - RUN_ID=local-run
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://localstack:4566
    volumes:
      - /tmp/sentinel-out:/app/sentinel-out
    depends_on:
      localstack:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully
      target:
        condition: service_healthy
